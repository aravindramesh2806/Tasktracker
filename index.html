<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#ff6b8a" />
<title>Our Daily Tracker</title>
<style>
  :root{
    --bg1:#fff1f4; --bg2:#f3f0ff; --card:#ffffff; --ink:#25202a; --muted:#948e9e;
    --line:#efeaf2; --accent:#ff6b8a; --accent2:#7b6cff; --done:#28c191;
    --shadow:0 8px 30px rgba(60,40,80,.08); --shadow-sm:0 2px 10px rgba(60,40,80,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);min-height:100vh;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px}

  /* Header */
  .hero{text-align:center;padding:14px 0 6px}
  .hero .heart{font-size:30px;filter:drop-shadow(0 3px 6px rgba(255,107,138,.4))}
  .hero h1{font-size:24px;margin:6px 0 3px;font-weight:800;letter-spacing:-.3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .sub{color:var(--muted);font-size:13.5px;margin:0}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}

  /* Setup */
  .setup{padding:26px 22px;text-align:center;margin-top:18px}
  .setup h2{font-size:18px;margin:0 0 6px;font-weight:700}
  .setup p{font-size:13.5px;color:var(--muted);margin:0 0 18px;line-height:1.5}
  .setup input{border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;width:100%;max-width:300px;margin-bottom:12px;outline:none;transition:border-color .15s}
  .setup input:focus{border-color:var(--accent)}
  .btn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(255,107,138,.35);transition:transform .12s,box-shadow .12s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,107,138,.45)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:default;transform:none}

  /* App */
  .app{display:none;margin-top:16px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
  .who{display:flex;gap:8px}
  .who button{border:1.5px solid var(--line);background:var(--card);padding:7px 8px 7px 7px;border-radius:30px;font-size:13px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:7px;font-weight:600;transition:all .15s}
  .who button .ava{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .who button.active{border-color:transparent;color:#fff}
  .share{border:1.5px solid var(--line);background:var(--card);padding:9px 15px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-sm);transition:transform .12s}
  .share:hover{transform:translateY(-1px)}

  /* Overall progress */
  .overall{padding:16px 18px;margin-bottom:16px}
  .overall .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .overall .big{font-size:22px;font-weight:800}
  .overall .lbl{font-size:12.5px;color:var(--muted)}
  .bar{height:9px;border-radius:6px;background:#f0ecf4;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}

  /* Add */
  .add{padding:12px;display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px}
  .add input[type=text]{flex:1 1 170px;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;min-width:0;outline:none;transition:border-color .15s}
  .add input[type=text]:focus{border-color:var(--accent)}
  .add input[type=date]{border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:14px;color:var(--muted);outline:none}
  .add .addbtn{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;width:48px;font-size:24px;font-weight:400;cursor:pointer;flex:0 0 auto;line-height:1;box-shadow:0 6px 16px rgba(255,107,138,.3)}

  /* Filter */
  .filter{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);padding:5px;border-radius:30px;margin:0 auto 18px;width:fit-content;box-shadow:var(--shadow-sm)}
  .filter button{border:none;background:transparent;padding:8px 18px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
  .filter button.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff}

  /* Day groups */
  .daygroup{margin-bottom:22px}
  .dayhead{display:flex;justify-content:space-between;align-items:center;margin:0 6px 10px}
  .dayhead .d{font-size:13px;font-weight:700;color:var(--ink)}
  .dayhead .c{font-size:12px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:3px 10px;border-radius:20px}

  .task{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:13px;margin-bottom:10px;transition:transform .12s,opacity .2s;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .task .check{width:26px;height:26px;border-radius:50%;border:2.5px solid #e2dce8;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:all .18s}
  .task .check:hover{border-color:var(--done)}
  .task.done .check{background:var(--done);border-color:var(--done)}
  .task .body{flex:1;min-width:0}
  .task .txt{font-size:15px;word-break:break-word;font-weight:500;line-height:1.35}
  .task.done .txt{text-decoration:line-through;color:var(--muted)}
  .task .meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;gap:7px;align-items:center}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;display:inline-flex;align-items:center;gap:5px}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.85}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:#f4f0f7;color:var(--muted)}
  .badge.done{background:#e3f8f0;color:#1c9b74}
  .del{background:none;border:none;color:#c9c2d2;font-size:20px;cursor:pointer;flex:0 0 auto;padding:4px;line-height:1;transition:color .15s}
  .del:hover{color:var(--accent)}

  .empty{text-align:center;color:var(--muted);padding:44px 16px;font-size:14.5px}
  .empty .em{font-size:38px;display:block;margin-bottom:10px}
  .status{text-align:center;font-size:12px;color:var(--muted);margin-top:16px;min-height:16px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:500;opacity:0;transition:all .28s;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="heart">💗</div>
    <h1>Our Daily Tracker</h1>
    <p class="sub">A shared to-do list for two</p>
  </div>

  <!-- SETUP -->
  <div class="setup card" id="setup">
    <h2>Set up your shared list</h2>
    <p>Enter both names and create the list. You'll get a link to send each other — open that same link on any device to see the same tasks.</p>
    <input type="text" id="p1" placeholder="Your name" />
    <input type="text" id="p2" placeholder="Your partner's name" />
    <div><button class="btn" id="createBtn">Create our list 💕</button></div>
    <p style="margin:16px 0 0;font-size:12.5px">Already have a link? Just open it — no setup needed.</p>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <div class="topbar">
      <div class="who" id="whoBar"></div>
      <button class="share" id="shareBtn">🔗 Share link</button>
    </div>

    <div class="overall card">
      <div class="row"><span class="big" id="pctText">0%</span><span class="lbl" id="pctLbl">0 of 0 done</span></div>
      <div class="bar"><i id="pctBar" style="width:0%"></i></div>
    </div>

    <div class="add card">
      <input type="text" id="taskInput" placeholder="What needs doing?" />
      <input type="date" id="dateInput" />
      <button class="addbtn" id="addBtn" title="Add">+</button>
    </div>

    <div class="filter" id="filterBar">
      <button data-f="all" class="active">All</button>
      <button data-f="pending">Pending</button>
      <button data-f="done">Done</button>
    </div>

    <div id="list"></div>
    <div class="status" id="status"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const API = "https://jsonblob.com/api/jsonBlob";
  const $ = id => document.getElementById(id);
  let state = { people:["",""], tasks:{} };
  let blobId = null, me = null, filter = "all", pollTimer = null, saving = false, dirty = false;

  function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }
  function getIdFromUrl(){ const h=location.hash.replace(/^#/,""); return h||null; }
  function setStatus(s){ $("status").textContent=s; }
  const initials = n => (n||"?").trim().slice(0,2).toUpperCase();
  const colorFor = name => (state.people[0]===name) ? "#ff6b8a" : "#7b6cff";

  async function createBlob(){
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(state)});
    if(!res.ok) throw new Error("create failed ("+res.status+")");
    const loc = res.headers.get("Location") || res.headers.get("location");
    const id = loc ? loc.split("/").pop() : null;
    if(!id) throw new Error("no id returned");
    return id;
  }
  async function loadBlob(id){
    const res = await fetch(API+"/"+id,{headers:{"Accept":"application/json"}});
    if(!res.ok) throw new Error("load failed ("+res.status+")");
    return await res.json();
  }
  async function saveBlob(){
    if(!blobId) return;
    if(saving){ dirty=true; return; }
    saving=true;
    try{
      const res = await fetch(API+"/"+blobId,{method:"PUT",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(state)});
      if(!res.ok) throw new Error("save failed ("+res.status+")");
      setStatus("✓ Saved & synced · "+new Date().toLocaleTimeString());
    }catch(e){ setStatus("⚠ "+e.message+" — will retry"); }
    saving=false;
    if(dirty){ dirty=false; saveBlob(); }
  }
  async function mutate(fn){
    try{
      if(blobId){
        const latest = await loadBlob(blobId).catch(()=>null);
        if(latest && latest.tasks){ state.tasks = latest.tasks; if(latest.people) state.people=latest.people; }
      }
    }catch(e){}
    fn(); render(); saveBlob();
  }

  function fmtDay(d){
    const today=new Date().toISOString().slice(0,10);
    const tmr=new Date(Date.now()+864e5).toISOString().slice(0,10);
    const yst=new Date(Date.now()-864e5).toISOString().slice(0,10);
    if(d===today) return "Today";
    if(d===tmr) return "Tomorrow";
    if(d===yst) return "Yesterday";
    return new Date(d+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
  }

  function render(){
    const wb=$("whoBar"); wb.innerHTML="";
    state.people.forEach(p=>{
      if(!p) return;
      const b=document.createElement("button");
      const c=colorFor(p);
      b.innerHTML='<span class="ava" style="background:'+c+'">'+initials(p)+'</span>'+p;
      if(p===me){ b.classList.add("active"); b.style.background="linear-gradient(90deg,"+c+","+c+"dd)"; }
      b.onclick=()=>{ me=p; localStorage.setItem("tracker_me_"+blobId,p); render(); };
      wb.appendChild(b);
    });

    const all=Object.values(state.tasks||{});
    const totalDone=all.filter(t=>t.done).length;
    const pct = all.length? Math.round(totalDone/all.length*100):0;
    $("pctText").textContent=pct+"%";
    $("pctLbl").textContent=totalDone+" of "+all.length+" done";
    $("pctBar").style.width=pct+"%";

    let arr=all.slice();
    if(filter==="pending") arr=arr.filter(t=>!t.done);
    if(filter==="done") arr=arr.filter(t=>t.done);
    const list=$("list");
    if(arr.length===0){ list.innerHTML='<div class="empty card"><span class="em">🌸</span>No tasks here yet — add your first one above.</div>'; return; }

    const byDate={}; arr.forEach(t=>{(byDate[t.date]=byDate[t.date]||[]).push(t);});
    const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
    list.innerHTML="";
    dates.forEach(d=>{
      const items=byDate[d].sort((a,b)=>a.created-b.created);
      const doneN=items.filter(t=>t.done).length;
      const g=document.createElement("div"); g.className="daygroup";
      const h=document.createElement("div"); h.className="dayhead";
      h.innerHTML='<span class="d">'+fmtDay(d)+'</span><span class="c">'+doneN+"/"+items.length+' done</span>';
      g.appendChild(h);
      items.forEach(t=>{
        const el=document.createElement("div"); el.className="task"+(t.done?" done":"");
        el.innerHTML='<div class="check">'+(t.done?"✓":"")+'</div>'+
          '<div class="body"><div class="txt"></div>'+
          '<div class="meta"><span class="pill" style="background:'+colorFor(t.owner)+'"><span class="dot"></span>'+t.owner+'</span>'+
          '<span class="badge'+(t.done?" done":"")+'">'+(t.done?"Done":"Pending")+'</span></div></div>'+
          '<button class="del" title="Delete">×</button>';
        el.querySelector(".txt").textContent=t.text;
        el.querySelector(".check").onclick=()=>toggle(t.id);
        el.querySelector(".del").onclick=()=>del(t.id);
        g.appendChild(el);
      });
      list.appendChild(g);
    });
  }

  function addTask(){
    const txt=$("taskInput").value.trim();
    const date=$("dateInput").value||new Date().toISOString().slice(0,10);
    if(!txt) return;
    const id="t"+Date.now()+Math.floor(Math.random()*1000);
    mutate(()=>{ state.tasks[id]={id,text:txt,date,done:false,owner:me,created:Date.now()}; });
    $("taskInput").value="";
  }
  function toggle(id){ mutate(()=>{ if(state.tasks[id]) state.tasks[id].done=!state.tasks[id].done; }); }
  function del(id){ mutate(()=>{ delete state.tasks[id]; }); }

  function startPolling(){
    if(pollTimer) clearInterval(pollTimer);
    pollTimer=setInterval(async ()=>{
      if(saving) return;
      try{ const latest=await loadBlob(blobId); if(latest){ state=latest; render(); } }catch(e){}
    },5000);
  }

  async function enterApp(){
    $("setup").style.display="none";
    $("app").style.display="block";
    $("dateInput").value=new Date().toISOString().slice(0,10);
    me = localStorage.getItem("tracker_me_"+blobId) || state.people[0];
    render(); startPolling();
  }

  async function init(){
    document.querySelectorAll("#filterBar button").forEach(b=>{
      b.onclick=()=>{filter=b.dataset.f;
        document.querySelectorAll("#filterBar button").forEach(x=>x.classList.remove("active"));
        b.classList.add("active"); render();};
    });
    $("addBtn").onclick=addTask;
    $("taskInput").addEventListener("keydown",e=>{if(e.key==="Enter")addTask();});
    $("shareBtn").onclick=()=>{
      const url=location.href;
      navigator.clipboard.writeText(url).then(()=>toast("Link copied — send it to your partner 💌"))
        .catch(()=>{ prompt("Copy this link and send it to your partner:",url); });
    };
    $("createBtn").onclick=async ()=>{
      const p1=$("p1").value.trim()||"Me";
      const p2=$("p2").value.trim()||"Partner";
      $("createBtn").textContent="Creating…"; $("createBtn").disabled=true;
      try{
        state={people:[p1,p2],tasks:{}};
        blobId=await createBlob();
        location.hash=blobId;
        me=p1; localStorage.setItem("tracker_me_"+blobId,p1);
        enterApp();
        toast("List created! Tap 🔗 Share link to send it.");
      }catch(e){
        $("createBtn").textContent="Create our list 💕"; $("createBtn").disabled=false;
        alert("Couldn't create the list (network issue). Please try again.\n\n"+e.message);
      }
    };

    blobId=getIdFromUrl();
    if(blobId){
      $("setup").style.display="none";
      $("app").style.display="block";
      setStatus("Loading your list…");
      try{
        state=await loadBlob(blobId);
        if(!state.tasks) state.tasks={};
        if(!state.people) state.people=["Me","Partner"];
        enterApp();
      }catch(e){
        $("app").style.display="none";
        $("setup").style.display="block";
        alert("Couldn't open that list link. It may have expired or the link is wrong.\n\n"+e.message);
      }
    }
  }

  window.addEventListener("hashchange",()=>{ location.reload(); });
  init();
})();
</script>
</body>
</html>
